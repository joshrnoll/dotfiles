# Reload config with <leader> + r
unbind r
bind r source-file ~/.tmux.conf

# Extended keys config for pi.dev
set -g extended-keys on
set -g extended-keys-format csi-u

# Allows nvim and tmux to work better together
set-option -g focus-events on
set -g allow-passthrough on

# Rebind <leader> to Ctrl+s
set -g prefix C-s
set -g mouse on

# hjkl pane navigation
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Open window splits in current working directory
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Start window numbering at 1 instead of 0
set -g base-index 1

# Tokyo night status bar colors
set -g status-bg '#1a1b26'  
set -g status-fg '#c0caf5' 

# Show indicator when prefix is used
set -g status-left "#{?client_prefix,#[fg=green]  #[default], }"

# Use TPM if installing plugins:
# set -g @plugin 'tmux-plugins/tpm'
# run '~/.tmux/plugins/tpm/tpm'

# For pi extension

set -g window-status-format '#{?@pi_attention_state,#{?#{==:#{@pi_attention_state},input},#[fg=red],#{?#{==:#{@pi_attention_state},done},#[fg=yellow],}},}#I:#W#F#[default]'
set -g window-status-current-format '#{?@pi_attention_state,#{?#{==:#{@pi_attention_state},input},#[fg=red],#{?#{==:#{@pi_attention_state},done},#[fg=yellow],}},}#I:#W#F#[default]'
